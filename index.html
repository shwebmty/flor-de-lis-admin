<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flor de Lis — Panel de administrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --vino:#6e1f2f; --oro:#b8863b; --crema:#f8f3ea; --tinta:#2b2420; --tinta-suave:#6b5f52; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--crema);color:var(--tinta);
       font-family:'Manrope',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{max-width:520px;width:100%;background:#fff;border:1px solid rgba(184,134,59,0.35);
        border-radius:8px;padding:40px;text-align:center;}
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;}
  .brand span{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;}
  h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;margin:0 0 10px;}
  p{font-size:15px;line-height:1.6;color:var(--tinta-suave);margin:0 0 8px;}
  .who{margin-top:24px;padding:14px 18px;border-radius:6px;background:var(--crema);
       border:1px solid rgba(184,134,59,0.3);font-size:14px;}
  .who strong{color:var(--vino);}
  .badge{display:inline-block;margin-top:20px;font-size:12px;font-weight:700;letter-spacing:1px;
         text-transform:uppercase;color:var(--oro);}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg width="26" height="32" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C11 6 9 11 9 16c0 4 3 7 7 7s7-3 7-7c0-5-2-10-7-16z" fill="#b8863b"></path>
        <path d="M9 12c-5 1-8 5-7 9 1 3 4 5 7 4 2-1 3-3 3-5-3-1-4-4-3-8z" fill="#b8863b"></path>
        <path d="M23 12c5 1 8 5 7 9-1 3-4 5-7 4-2-1-3-3-3-5 3-1 4-4 3-8z" fill="#b8863b"></path>
        <rect x="10" y="24" width="12" height="3" rx="1.5" fill="#b8863b"></rect>
        <path d="M14 27h4v10a2 2 0 01-2 2 2 2 0 01-2-2V27z" fill="#b8863b"></path>
      </svg>
      <span>Flor de Lis</span>
    </div>
    <span class="badge">Panel de administrador</span>
    <h1 style="margin-top:14px;">Acceso verificado</h1>
    <p>Si estás viendo esta página, el inicio de sesión con Google quedó bien configurado.</p>
    <div class="who" id="who">Comprobando tu sesión…</div>
    <p style="margin-top:24px;font-size:13px;">El panel completo (activar productos, editar, fotos y pedidos) se está construyendo y aparecerá aquí en breve.</p>
  </div>

<script>
  // Cloudflare Access expone la identidad del usuario autenticado en esta ruta.
  fetch("/cdn-cgi/access/get-identity")
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(id => {
      document.getElementById("who").innerHTML =
        'Entraste como <strong>' + (id.email || "usuario autenticado") + '</strong>';
    })
    .catch(() => {
      document.getElementById("who").textContent =
        "No se pudo leer la sesión (esto es normal si aún no configuras Cloudflare Access).";
    });
</script>
</body>
</html>
